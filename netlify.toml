[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  # This should be replaced with your actual production backend URL 
  # For local development, use your development environment
  to = "http://localhost:5000/api/:splat"
  status = 200
  force = true